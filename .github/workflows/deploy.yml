name: Build and Deploy to Nexus

on:
  push:
    branches:
      - develop
    tags:
      - 'v*.*.*'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Temurin JDK 17 (with Gradle cache)
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Compute build metadata
        run: |
          if [[ "$GITHUB_REF" == "refs/heads/develop" ]]; then
            echo "BUILD_VERSION=1.0.${GITHUB_RUN_NUMBER}-SNAPSHOT" >> "$GITHUB_ENV"
            echo "NEXUS_URL=${{ secrets.NEXUS_SNAPSHOT_URL }}"     >> "$GITHUB_ENV"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "BUILD_VERSION=${GITHUB_REF#refs/tags/v}"         >> "$GITHUB_ENV"
            echo "NEXUS_URL=${{ secrets.NEXUS_RELEASE_URL }}"      >> "$GITHUB_ENV"
          fi
          echo "Computed BUILD_VERSION=$BUILD_VERSION"
          echo "Using NEXUS_URL=$NEXUS_URL"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Publish to Nexus
        run: ./gradlew publish
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
          NEXUS_URL:      ${{ env.NEXUS_URL }}
          BUILD_VERSION:  ${{ env.BUILD_VERSION }}
